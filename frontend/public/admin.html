<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Match AI – Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-light: #818cf8;
      --primary-glow: rgba(99, 102, 241, 0.2);
      --secondary: #ec489a;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
      --dark: #0f172a;
      --dark-soft: #1e293b;
      --gray: #64748b;
      --gray-light: #94a3b8;
      --gray-bg: #f1f5f9;
      --white: #ffffff;
      --sidebar-bg: #0f172a;
      --sidebar-hover: #1e293b;
      --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.02);
      --card-shadow-hover: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
      --radius: 20px;
      --radius-sm: 12px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
      color: var(--dark);
      overflow-x: hidden;
    }

    /* Layout */
    .dashboard {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: var(--sidebar-bg);
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 50;
      transition: var(--transition);
      overflow-y: auto;
    }
    .sidebar-header {
      padding: 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
    }
    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      font-weight: 800;
      color: white;
    }
    .logo-text {
      font-size: 1.25rem;
      font-weight: 700;
      color: white;
      letter-spacing: -0.5px;
    }
    .admin-badge {
      display: inline-block;
      background: rgba(255, 255, 255, 0.2);
      padding: 0.25rem 0.5rem;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 500;
      margin-left: 0.5rem;
      color: var(--primary-light);
    }
    .sidebar-nav {
      padding: 1.5rem;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      border-radius: var(--radius-sm);
      color: var(--gray-light);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: var(--transition);
      margin-bottom: 0.5rem;
    }
    .nav-item i {
      width: 20px;
      font-size: 1rem;
    }
    .nav-item:hover {
      background: var(--sidebar-hover);
      color: white;
    }
    .nav-item.active {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      box-shadow: 0 4px 12px var(--primary-glow);
    }
    .sidebar-footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1.5rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .user-avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: white;
    }
    .user-details {
      flex: 1;
    }
    .user-name {
      font-size: 0.875rem;
      font-weight: 600;
      color: white;
    }
    .user-role {
      font-size: 0.75rem;
      color: var(--gray-light);
    }
    .logout-btn {
      width: 100%;
      padding: 0.75rem;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      border-radius: var(--radius-sm);
      color: var(--gray-light);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .logout-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      color: white;
    }

    /* Main Content */
    .main-content {
      flex: 1;
      margin-left: 280px;
      padding: 2rem;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .page-title h1 {
      font-size: 1.75rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--dark), var(--primary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .page-title p {
      font-size: 0.875rem;
      color: var(--gray);
      margin-top: 0.25rem;
    }
    .refresh-btn {
      background: var(--white);
      border: 1px solid var(--gray-bg);
      padding: 0.625rem 1.25rem;
      border-radius: 40px;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--gray);
      cursor: pointer;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .refresh-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }
    .refresh-btn i {
      transition: transform 0.3s ease;
    }
    .refresh-btn:active i {
      transform: rotate(180deg);
    }

    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--card-shadow);
      border: 1px solid rgba(0, 0, 0, 0.05);
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      opacity: 0;
      transition: var(--transition);
    }
    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--card-shadow-hover);
    }
    .stat-card:hover::before {
      opacity: 1;
    }
    .stat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .stat-icon {
      width: 56px;
      height: 56px;
      background: var(--gray-bg);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }
    .stat-icon.students { background: #dbeafe; color: var(--primary); }
    .stat-icon.projects { background: #dcfce7; color: var(--success); }
    .stat-icon.applications { background: #fef3c7; color: var(--warning); }
    .stat-icon.matches { background: #f3e8ff; color: var(--secondary); }
    .stat-value {
      font-size: 2.25rem;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 0.25rem;
    }
    .stat-label {
      font-size: 0.75rem;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stat-trend {
      font-size: 0.7rem;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      margin-top: 0.5rem;
    }
    .trend-up { color: var(--success); }
    .trend-down { color: var(--danger); }

    /* Charts Row */
    .charts-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    .chart-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--card-shadow);
      border: 1px solid rgba(0, 0, 0, 0.05);
    }
    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
    }
    .chart-header h3 {
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .chart-header h3 i {
      color: var(--primary);
    }
    .chart-container {
      min-height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Skills Section */
    .skills-section {
      background: var(--white);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--card-shadow);
      border: 1px solid rgba(0, 0, 0, 0.05);
      margin-bottom: 2rem;
    }
    .skills-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .skills-header h3 {
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .skills-header h3 i {
      color: var(--primary);
    }
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }
    .skill-item {
      background: var(--gray-bg);
      border-radius: var(--radius-sm);
      padding: 0.875rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: var(--transition);
    }
    .skill-item:hover {
      transform: translateX(4px);
      background: var(--primary-glow);
    }
    .skill-name {
      font-weight: 600;
      font-size: 0.875rem;
      color: var(--dark);
    }
    .skill-count {
      background: var(--white);
      padding: 0.25rem 0.625rem;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--primary);
    }

    /* Activity Section */
    .activity-section {
      background: var(--white);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--card-shadow);
      border: 1px solid rgba(0, 0, 0, 0.05);
    }
    .activity-header {
      margin-bottom: 1.25rem;
    }
    .activity-header h3 {
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .activity-header h3 i {
      color: var(--primary);
    }
    .activity-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .activity-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem;
      background: var(--gray-bg);
      border-radius: var(--radius-sm);
      transition: var(--transition);
    }
    .activity-item:hover {
      background: var(--primary-glow);
    }
    .activity-icon {
      width: 40px;
      height: 40px;
      background: var(--white);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }
    .activity-icon.student { color: var(--primary); }
    .activity-icon.project { color: var(--success); }
    .activity-icon.application { color: var(--warning); }
    .activity-content {
      flex: 1;
    }
    .activity-text {
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.25rem;
    }
    .activity-time {
      font-size: 0.7rem;
      color: var(--gray-light);
    }
    .activity-badge {
      font-size: 0.7rem;
      padding: 0.25rem 0.625rem;
      border-radius: 40px;
      font-weight: 500;
    }
    .activity-badge.pending { background: #fef3c7; color: #92400e; }
    .activity-badge.accepted { background: #d1fae5; color: #065f46; }

    /* Loading */
    .loading {
      text-align: center;
      padding: 2rem;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--gray-bg);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--dark);
      color: white;
      padding: 0.75rem 1.25rem;
      border-radius: 50px;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      z-index: 1100;
      transform: translateX(400px);
      transition: transform 0.3s ease;
    }
    .toast.show {
      transform: translateX(0);
    }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }

    /* Responsive */
    @media (max-width: 900px) {
      .charts-row {
        grid-template-columns: 1fr;
      }
      .skills-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      }
    }
    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
        z-index: 100;
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .main-content {
        margin-left: 0;
        padding: 1rem;
      }
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="#" class="logo">
          <div class="logo-icon">S</div>
          <div>
            <span class="logo-text">SmartMatch AI</span>
            <span class="admin-badge">Admin</span>
          </div>
        </a>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active">
          <i class="fas fa-chart-line"></i> Tổng quan
        </a>
        <a href="dashboard.html" class="nav-item">
          <i class="fas fa-th-large"></i> Student Dashboard
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">A</div>
          <div class="user-details">
            <div class="user-name" id="userName">Administrator</div>
            <div class="user-role" id="userRole">Admin</div>
          </div>
        </div>
        <button class="logout-btn" id="logoutBtn">
          <i class="fas fa-sign-out-alt"></i> Đăng xuất
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="top-bar">
        <div class="page-title">
          <h1>Admin Dashboard</h1>
          <p>Tổng quan hệ thống Smart Match AI</p>
        </div>
        <button class="refresh-btn" id="refreshBtn">
          <i class="fas fa-sync-alt"></i> Làm mới dữ liệu
        </button>
      </div>

      <!-- Stats Grid -->
      <div class="stats-grid" id="statsGrid">
        <div class="loading" style="grid-column: span 4;"><div class="spinner"></div><p>Đang tải thống kê...</p></div>
      </div>

      <!-- Charts Row -->
      <div class="charts-row">
        <div class="chart-card">
          <div class="chart-header">
            <h3><i class="fas fa-chart-pie"></i> Phân bố người dùng</h3>
          </div>
          <div class="chart-container" id="userChart">
            <canvas id="userPieChart" width="300" height="250"></canvas>
          </div>
        </div>
        <div class="chart-card">
          <div class="chart-header">
            <h3><i class="fas fa-chart-bar"></i> Xu hướng ứng tuyển</h3>
          </div>
          <div class="chart-container" id="trendChart">
            <canvas id="trendBarChart" width="300" height="250"></canvas>
          </div>
        </div>
      </div>

      <!-- Top Skills -->
      <div class="skills-section">
        <div class="skills-header">
          <h3><i class="fas fa-trophy"></i> Kỹ năng phổ biến nhất</h3>
          <span id="skillsCount" style="font-size: 0.75rem; color: var(--gray);"></span>
        </div>
        <div class="skills-grid" id="skillsGrid">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- Recent Activity -->
      <div class="activity-section">
        <div class="activity-header">
          <h3><i class="fas fa-clock"></i> Hoạt động gần đây</h3>
        </div>
        <div class="activity-list" id="activityList">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    // Frontend runs in the user's browser; use a hostname that the browser can resolve.
    const API = (() => {
      const host = location.hostname || 'localhost';
      return `http://${host}:5000`;
    })();
    let token = localStorage.getItem('sm_token');
    let userRole = localStorage.getItem('sm_role');
    let userPieChart = null;
    let trendBarChart = null;

    // Auth check - only admin can access
    if (!token) {
      window.location.href = 'auth.html';
    }

    // Check if user is admin (you may need to implement admin role check)
    // For now, we'll assume admin access

    // Helper functions
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    // Update charts
    function updateCharts(studentsCount, lecturersCount, applicationsData) {
      const userCtx = document.getElementById('userPieChart')?.getContext('2d');
      const trendCtx = document.getElementById('trendBarChart')?.getContext('2d');
      
      if (userCtx) {
        if (userPieChart) userPieChart.destroy();
        userPieChart = new Chart(userCtx, {
          type: 'pie',
          data: {
            labels: ['Sinh viên', 'Giảng viên'],
            datasets: [{
              data: [studentsCount, lecturersCount],
              backgroundColor: ['#6366f1', '#ec489a'],
              borderWidth: 0,
              hoverOffset: 10
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
              legend: {
                position: 'bottom',
                labels: { font: { size: 12 } }
              }
            }
          }
        });
      }
      
      if (trendCtx) {
        if (trendBarChart) trendBarChart.destroy();
        const weeks = applicationsData.map(d => d.week);
        const counts = applicationsData.map(d => d.count);
        trendBarChart = new Chart(trendCtx, {
          type: 'bar',
          data: {
            labels: weeks,
            datasets: [{
              label: 'Số đơn ứng tuyển',
              data: counts,
              backgroundColor: 'rgba(99, 102, 241, 0.7)',
              borderRadius: 8,
              barPercentage: 0.65
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
              legend: { display: false }
            },
            scales: {
              y: {
                beginAtZero: true,
                grid: { color: '#e2e8f0' },
                ticks: { stepSize: 1 }
              },
              x: {
                grid: { display: false }
              }
            }
          }
        });
      }
    }

    // Render skills
    function renderSkills(skills) {
      const container = document.getElementById('skillsGrid');
      const skillsCount = document.getElementById('skillsCount');
      
      if (!skills || skills.length === 0) {
        container.innerHTML = '<p style="color: var(--gray); text-align: center;">Chưa có dữ liệu kỹ năng</p>';
        skillsCount.textContent = '';
        return;
      }
      
      skillsCount.textContent = `Top ${skills.length} kỹ năng`;
      container.innerHTML = skills.map(skill => `
        <div class="skill-item">
          <span class="skill-name">${escapeHtml(skill.skill)}</span>
          <span class="skill-count">${skill.count}</span>
        </div>
      `).join('');
    }

    // Render activity
    function renderActivity(activities) {
      const container = document.getElementById('activityList');
      
      if (!activities || activities.length === 0) {
        container.innerHTML = '<p style="color: var(--gray); text-align: center; padding: 2rem;">Chưa có hoạt động gần đây</p>';
        return;
      }
      
      const getIconClass = (type) => {
        if (type === 'student_register') return 'student';
        if (type === 'project_created') return 'project';
        return 'application';
      };
      
      const getIcon = (type) => {
        if (type === 'student_register') return '<i class="fas fa-user-plus"></i>';
        if (type === 'project_created') return '<i class="fas fa-folder-open"></i>';
        return '<i class="fas fa-file-alt"></i>';
      };
      
      const getStatusBadge = (status) => {
        if (!status) return '';
        if (status === 'pending') return '<span class="activity-badge pending">Chờ duyệt</span>';
        if (status === 'accepted') return '<span class="activity-badge accepted">Đã chấp nhận</span>';
        return '';
      };
      
      container.innerHTML = activities.map(activity => `
        <div class="activity-item">
          <div class="activity-icon ${getIconClass(activity.type)}">
            ${getIcon(activity.type)}
          </div>
          <div class="activity-content">
            <div class="activity-text">${escapeHtml(activity.message)}</div>
            <div class="activity-time">${activity.time}</div>
          </div>
          ${activity.status ? getStatusBadge(activity.status) : ''}
        </div>
      `).join('');
    }

    // Load admin stats
    async function loadAdminStats() {
      // Show loading states
      document.getElementById('statsGrid').innerHTML = `
        <div class="loading" style="grid-column: span 4;"><div class="spinner"></div><p>Đang tải thống kê...</p></div>
      `;
      document.getElementById('skillsGrid').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      document.getElementById('activityList').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
      
      try {
        const res = await fetch(`${API}/api/admin/stats`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        
        if (res.status === 401) {
          window.location.href = 'auth.html';
          return;
        }
        
        if (!res.ok) {
          const data = await res.json();
          showToast(data.message || 'Không thể tải thống kê', 'error');
          return;
        }
        
        const data = await res.json();
        
        // Update stats cards
        const statsHtml = `
          <div class="stat-card">
            <div class="stat-header">
              <div class="stat-icon students"><i class="fas fa-users"></i></div>
            </div>
            <div class="stat-value">${data.total_students || 0}</div>
            <div class="stat-label">Sinh viên</div>
            <div class="stat-trend trend-up"><i class="fas fa-arrow-up"></i> +12%</div>
          </div>
          <div class="stat-card">
            <div class="stat-header">
              <div class="stat-icon projects"><i class="fas fa-briefcase"></i></div>
            </div>
            <div class="stat-value">${data.total_projects || 0}</div>
            <div class="stat-label">Dự án</div>
            <div class="stat-trend trend-up"><i class="fas fa-arrow-up"></i> +8%</div>
          </div>
          <div class="stat-card">
            <div class="stat-header">
              <div class="stat-icon applications"><i class="fas fa-file-alt"></i></div>
            </div>
            <div class="stat-value">${data.total_applications || 0}</div>
            <div class="stat-label">Đơn ứng tuyển</div>
            <div class="stat-trend trend-up"><i class="fas fa-arrow-up"></i> +23%</div>
          </div>
          <div class="stat-card">
            <div class="stat-header">
              <div class="stat-icon matches"><i class="fas fa-chart-line"></i></div>
            </div>
            <div class="stat-value">${data.avg_match_score ? Math.round(data.avg_match_score) + '%' : '—'}</div>
            <div class="stat-label">Điểm phù hợp TB</div>
            <div class="stat-trend trend-up"><i class="fas fa-arrow-up"></i> +5%</div>
          </div>
        `;
        document.getElementById('statsGrid').innerHTML = statsHtml;
        
        // Update charts
        updateCharts(data.total_students || 0, data.total_lecturers || 0, data.applications_trend || []);
        
        // Update skills
        renderSkills(data.top_skills || []);
        
        // Update activity
        renderActivity(data.recent_activities || []);
        
        showToast('Đã cập nhật dữ liệu', 'success');
        
      } catch (err) {
        console.error('Error loading admin stats:', err);
        document.getElementById('statsGrid').innerHTML = `
          <div class="stat-card" style="grid-column: span 4;">
            <div class="stat-header">
              <div class="stat-icon" style="background: #fee2e2; color: var(--danger);"><i class="fas fa-exclamation-triangle"></i></div>
            </div>
            <div class="stat-value">Lỗi</div>
            <div class="stat-label">Không thể tải dữ liệu</div>
          </div>
        `;
        showToast('Lỗi kết nối server', 'error');
      }
    }

    // Update sidebar user
    const currentUser = JSON.parse(localStorage.getItem('sm_user') || '{}');
    const userName = currentUser.full_name || currentUser.name || 'Administrator';
    document.getElementById('userAvatar').textContent = userName.charAt(0).toUpperCase();
    document.getElementById('userName').textContent = userName;
    document.getElementById('userRole').textContent = 'Admin';

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', () => {
      ['sm_token', 'sm_user', 'sm_user_id', 'sm_role'].forEach(k => localStorage.removeItem(k));
      window.location.href = 'auth.html';
    });

    // Refresh button
    document.getElementById('refreshBtn').addEventListener('click', () => {
      const btn = document.getElementById('refreshBtn');
      btn.disabled = true;
      btn.querySelector('i').style.animation = 'spin 0.5s linear';
      loadAdminStats().finally(() => {
        btn.disabled = false;
        setTimeout(() => {
          btn.querySelector('i').style.animation = '';
        }, 500);
      });
    });

    // Add spin animation
    const style = document.createElement('style');
    style.textContent = `@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }`;
    document.head.appendChild(style);

    // Initialize
    loadAdminStats();
  </script>
</body>
</html>
