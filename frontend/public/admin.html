<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <style>
    :root { font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    body { margin: 0; padding: 20px; background: #f5f7fb; color: #111; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .card { padding: 16px; background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,.05); }
    .card h3 { margin: 0 0 12px; font-size: 1.1rem; }
    .list-item { font-size: 0.95rem; margin-bottom: 6px; }
    .topline { margin-bottom: 16px; display:flex; justify-content:space-between; align-items:center; }
    .topline a { text-decoration:none; color:#2563eb; font-weight:600; }
    .status { margin-bottom: 16px; color:#333; }
    .btn { border:none; border-radius:8px; background:#2563eb; color:#fff; padding:8px 12px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="topline">
    <h1>Admin Stats</h1>
    <a href="dashboard.html">Go to Student Dashboard</a>
  </div>
  <div id="status" class="status">Loading admin stats...</div>
  <div class="grid" id="statsGrid"></div>
  <div class="card">
    <h3>Top Skills</h3>
    <div id="topSkills"></div>
  </div>
  <button class="btn" onclick="loadAdminStats()">Refresh Stats</button>
  <script src="admin.js"></script>
</body>
</html>
