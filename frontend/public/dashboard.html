<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Match AI – Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-light: #818cf8;
      --primary-glow: rgba(99, 102, 241, 0.2);
      --secondary: #ec489a;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --dark: #0f172a;
      --dark-soft: #1e293b;
      --gray: #64748b;
      --gray-light: #94a3b8;
      --gray-bg: #f1f5f9;
      --white: #ffffff;
      --sidebar-bg: #0f172a;
      --sidebar-hover: #1e293b;
      --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.02);
      --card-shadow-hover: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
      --radius: 20px;
      --radius-sm: 12px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
      color: var(--dark);
      overflow-x: hidden;
    }

    /* Layout */
    .dashboard {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: var(--sidebar-bg);
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 50;
      transition: var(--transition);
      overflow-y: auto;
    }
    .sidebar-header {
      padding: 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
    }
    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      font-weight: 800;
      color: white;
    }
    .logo-text {
      font-size: 1.25rem;
      font-weight: 700;
      color: white;
      letter-spacing: -0.5px;
    }
    .sidebar-nav {
      padding: 1.5rem;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      border-radius: var(--radius-sm);
      color: var(--gray-light);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: var(--transition);
      margin-bottom: 0.5rem;
    }
    .nav-item i {
      width: 20px;
      font-size: 1rem;
    }
    .nav-item:hover {
      background: var(--sidebar-hover);
      color: white;
    }
    .nav-item.active {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      box-shadow: 0 4px 12px var(--primary-glow);
    }
    .sidebar-footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1.5rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .user-avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: white;
    }
    .user-details {
      flex: 1;
    }
    .user-name {
      font-size: 0.875rem;
      font-weight: 600;
      color: white;
    }
    .user-role {
      font-size: 0.75rem;
      color: var(--gray-light);
    }
    .logout-btn {
      width: 100%;
      padding: 0.75rem;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      border-radius: var(--radius-sm);
      color: var(--gray-light);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .logout-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      color: white;
    }

    /* Main Content */
    .main-content {
      flex: 1;
      margin-left: 280px;
      padding: 2rem;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .page-title h1 {
      font-size: 1.75rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--dark), var(--primary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .page-title p {
      font-size: 0.875rem;
      color: var(--gray);
      margin-top: 0.25rem;
    }
    .role-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--white);
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 600;
      box-shadow: var(--card-shadow);
    }
    .role-badge i {
      font-size: 0.875rem;
    }
    .role-badge.student i { color: var(--primary); }
    .role-badge.lecturer i { color: var(--secondary); }

    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--card-shadow);
      transition: var(--transition);
      border: 1px solid rgba(0, 0, 0, 0.05);
    }
    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--card-shadow-hover);
    }
    .stat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .stat-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary-glow), rgba(236, 72, 153, 0.1));
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: var(--primary);
    }
    .stat-value {
      font-size: 2rem;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 0.25rem;
    }
    .stat-label {
      font-size: 0.75rem;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stat-trend {
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }
    .trend-up { color: var(--success); }
    .trend-down { color: var(--danger); }

    /* Projects Grid */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .section-header h2 {
      font-size: 1.25rem;
      font-weight: 700;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      padding: 0.625rem 1.25rem;
      border-radius: 40px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px var(--primary-glow);
    }
    .btn-outline {
      background: transparent;
      border: 1.5px solid var(--primary);
      color: var(--primary);
      padding: 0.5rem 1rem;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }
    .btn-outline:hover {
      background: var(--primary);
      color: white;
    }
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }
    .project-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 1.5rem;
      transition: var(--transition);
      border: 1px solid rgba(0, 0, 0, 0.05);
      position: relative;
    }
    .project-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--card-shadow-hover);
    }
    .project-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
    }
    .project-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--dark);
    }
    .status-badge {
      padding: 0.25rem 0.75rem;
      border-radius: 40px;
      font-size: 0.625rem;
      font-weight: 600;
    }
    .status-open { background: #d1fae5; color: #065f46; }
    .status-closed { background: #fee2e2; color: #991b1b; }
    .status-pending { background: #fef3c7; color: #92400e; }
    .status-accepted { background: #d1fae5; color: #065f46; }
    .project-description {
      font-size: 0.75rem;
      color: var(--gray);
      line-height: 1.5;
      margin-bottom: 1rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .project-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .tag {
      padding: 0.25rem 0.75rem;
      background: var(--gray-bg);
      border-radius: 40px;
      font-size: 0.625rem;
      font-weight: 500;
      color: var(--gray);
    }
    .score-bar {
      margin-bottom: 1rem;
    }
    .score-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.625rem;
      margin-bottom: 0.25rem;
      color: var(--gray);
    }
    .bar {
      height: 6px;
      background: var(--gray-bg);
      border-radius: 3px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      border-radius: 3px;
      transition: width 0.6s ease;
    }
    .project-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--gray-bg);
    }
    .project-meta {
      font-size: 0.625rem;
      color: var(--gray-light);
    }
    .apply-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 0.375rem 1rem;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }
    .apply-btn:hover {
      background: var(--primary-dark);
      transform: scale(0.98);
    }
    .apply-btn:disabled {
      background: var(--gray-light);
      cursor: not-allowed;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 3rem;
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid rgba(0, 0, 0, 0.05);
    }
    .empty-state i {
      font-size: 3rem;
      color: var(--gray-light);
      margin-bottom: 1rem;
    }
    .empty-state p {
      color: var(--gray);
      margin-bottom: 1rem;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal.active {
      display: flex;
    }
    .modal-content {
      background: var(--white);
      border-radius: var(--radius);
      max-width: 500px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      animation: modalSlideIn 0.3s ease;
    }
    @keyframes modalSlideIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .modal-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--gray-bg);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h3 {
      font-size: 1.125rem;
      font-weight: 700;
    }
    .modal-close {
      background: none;
      border: none;
      font-size: 1.25rem;
      cursor: pointer;
      color: var(--gray);
    }
    .modal-body {
      padding: 1.5rem;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--gray);
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 0.75rem;
      border: 1.5px solid var(--gray-bg);
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-family: inherit;
      transition: var(--transition);
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }
    .modal-footer {
      padding: 1rem 1.5rem 1.5rem;
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--dark);
      color: white;
      padding: 0.75rem 1.25rem;
      border-radius: 50px;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      z-index: 1100;
      transform: translateX(400px);
      transition: transform 0.3s ease;
    }
    .toast.show {
      transform: translateX(0);
    }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }
    .toast.warning { background: var(--warning); }

    /* Loading */
    .loading {
      text-align: center;
      padding: 2rem;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--gray-bg);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
        z-index: 100;
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .main-content {
        margin-left: 0;
        padding: 1rem;
      }
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
      }
      .projects-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="#" class="logo">
          <div class="logo-icon">S</div>
          <span class="logo-text">SmartMatch AI</span>
        </a>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-page="dashboard">
          <i class="fas fa-th-large"></i> Dashboard
        </a>
        <a href="#" class="nav-item" data-page="profile" id="navProfile">
          <i class="fas fa-user"></i> Hồ sơ cá nhân
        </a>
        <a href="#" class="nav-item" data-page="applications" id="navApplications">
          <i class="fas fa-file-alt"></i> Đơn ứng tuyển
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">U</div>
          <div class="user-details">
            <div class="user-name" id="userName">Đang tải...</div>
            <div class="user-role" id="userRole"></div>
          </div>
        </div>
        <button class="logout-btn" id="logoutBtn">
          <i class="fas fa-sign-out-alt"></i> Đăng xuất
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="top-bar">
        <div class="page-title">
          <h1 id="pageTitle">Dashboard</h1>
          <p id="pageSubtitle">Chào mừng bạn trở lại!</p>
        </div>
        <div class="role-badge" id="roleBadge">
          <i class="fas fa-graduation-cap"></i>
          <span id="roleText">Sinh viên</span>
        </div>
      </div>

      <!-- Stats Grid -->
      <div class="stats-grid" id="statsGrid"></div>

      <!-- Student View -->
      <div id="studentView">
        <div class="section-header">
          <h2><i class="fas fa-star" style="color: var(--warning);"></i> Dự án phù hợp với bạn</h2>
          <span id="recCount" style="font-size: 0.75rem; color: var(--gray);"></span>
        </div>
        <div id="projectsGrid" class="projects-grid"></div>
      </div>

      <!-- Lecturer View -->
      <div id="lecturerView" style="display: none;">
        <div class="section-header">
          <h2><i class="fas fa-briefcase"></i> Dự án của bạn</h2>
          <button class="btn-primary" id="createProjectBtn">
            <i class="fas fa-plus"></i> Tạo dự án mới
          </button>
        </div>
        <div id="lecturerProjectsGrid" class="projects-grid"></div>
      </div>
    </main>
  </div>

  <!-- Apply Modal -->
  <div class="modal" id="applyModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="applyModalTitle">Ứng tuyển dự án</h3>
        <button class="modal-close" onclick="closeModal('applyModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Thư giới thiệu (tùy chọn)</label>
          <textarea id="applicationText" rows="5" placeholder="Giới thiệu về bản thân, kỹ năng và lý do bạn muốn tham gia dự án này..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-outline" onclick="closeModal('applyModal')">Hủy</button>
        <button class="btn-primary" id="confirmApplyBtn">Gửi ứng tuyển</button>
      </div>
    </div>
  </div>

  <!-- Create Project Modal -->
  <div class="modal" id="projectModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="projectModalTitle">Tạo dự án mới</h3>
        <button class="modal-close" onclick="closeModal('projectModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Tiêu đề *</label>
          <input type="text" id="projectTitle" placeholder="Nhập tiêu đề dự án" />
        </div>
        <div class="form-group">
          <label>Mô tả *</label>
          <textarea id="projectDesc" rows="4" placeholder="Mô tả chi tiết về dự án..."></textarea>
        </div>
        <div class="form-group">
          <label>Lĩnh vực nghiên cứu</label>
          <input type="text" id="projectField" placeholder="VD: Machine Learning, AI, Data Science..." />
        </div>
        <div class="form-group">
          <label>Kỹ năng yêu cầu (phân cách bằng dấu phẩy)</label>
          <input type="text" id="projectSkills" placeholder="Python, SQL, Machine Learning..." />
        </div>
        <div class="form-group">
          <label>Độ khó</label>
          <select id="projectDifficulty">
            <option value="easy">Dễ</option>
            <option value="medium" selected>Trung bình</option>
            <option value="hard">Khó</option>
          </select>
        </div>
        <div class="form-group">
          <label>Số lượng sinh viên tối đa</label>
          <input type="number" id="projectMaxStudents" value="1" min="1" />
        </div>
        <div class="form-group">
          <label>Thời gian (tuần)</label>
          <input type="number" id="projectWeeks" placeholder="VD: 12" />
        </div>
        <div class="form-group">
          <label>Hạn nộp</label>
          <input type="date" id="projectDeadline" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-outline" onclick="closeModal('projectModal')">Hủy</button>
        <button class="btn-primary" id="confirmProjectBtn">Tạo dự án</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script>
      // Frontend runs in the user's browser; use a hostname that the browser can resolve.
      const API = (() => {
        const host = location.hostname || 'localhost';
        return `http://${host}:5000`;
      })();
    let token = localStorage.getItem('sm_token');
    let userRole = localStorage.getItem('sm_role');
    let currentUser = JSON.parse(localStorage.getItem('sm_user') || '{}');
    let selectedProjectId = null;

    // Auth check
    if (!token) {
      window.location.href = 'auth.html';
    }

    // Helper functions
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${message}`;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function closeModal(modalId) {
      document.getElementById(modalId).classList.remove('active');
    }

    function openModal(modalId) {
      document.getElementById(modalId).classList.add('active');
    }

    // Update sidebar user info
    function updateSidebar() {
      const name = currentUser.full_name || currentUser.name || 'Người dùng';
      const avatar = name.charAt(0).toUpperCase();
      document.getElementById('userAvatar').textContent = avatar;
      document.getElementById('userName').textContent = name;
      document.getElementById('userRole').textContent = userRole === 'lecturer' ? 'Giảng viên' : 'Sinh viên';
      
      const roleBadge = document.getElementById('roleBadge');
      const roleText = document.getElementById('roleText');
      if (userRole === 'lecturer') {
        roleBadge.classList.add('lecturer');
        roleBadge.classList.remove('student');
        roleText.textContent = 'Giảng viên';
        document.getElementById('roleBadge').innerHTML = '<i class="fas fa-chalkboard-user"></i> Giảng viên';
      } else {
        roleBadge.classList.add('student');
        roleBadge.classList.remove('lecturer');
        roleText.textContent = 'Sinh viên';
        document.getElementById('roleBadge').innerHTML = '<i class="fas fa-graduation-cap"></i> Sinh viên';
      }
    }

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', () => {
      ['sm_token', 'sm_user', 'sm_user_id', 'sm_role'].forEach(k => localStorage.removeItem(k));
      window.location.href = 'auth.html';
    });

    // Navigation
    document.getElementById('navProfile').addEventListener('click', (e) => {
      e.preventDefault();
      window.location.href = 'profile.html';
    });
    document.getElementById('navApplications').addEventListener('click', (e) => {
      e.preventDefault();
      const page = userRole === 'lecturer' ? 'lecturer_applications.html' : 'my_applications.html';
      window.location.href = page;
    });

    // Student Dashboard
    async function loadStudentDashboard() {
      document.getElementById('studentView').style.display = 'block';
      document.getElementById('lecturerView').style.display = 'none';
      document.getElementById('pageTitle').textContent = 'Dashboard Sinh viên';
      document.getElementById('pageSubtitle').textContent = 'Khám phá các dự án phù hợp với kỹ năng của bạn';

      try {
        const [recRes, appsRes] = await Promise.all([
          fetch(`${API}/api/student/projects/recommended`, { headers: { Authorization: `Bearer ${token}` } }),
          fetch(`${API}/api/student/applications`, { headers: { Authorization: `Bearer ${token}` } })
        ]);

        const recData = await recRes.json();
        const appsData = appsRes.ok ? await appsRes.json() : { applications: [] };
        
        const recommendations = recData.recommendations || [];
        const applications = appsData.applications || [];
        const appliedIds = new Set(applications.map(a => a.project_id));

        // Trace data flow for debugging
        console.log('[dashboard] recommendations:', recommendations);
        
        // Stats
        const statsHtml = `
          <div class="stat-card">
            <div class="stat-header">
              <div class="stat-icon"><i class="fas fa-rocket"></i></div>
            </div>
            <div class="stat-value">${recommendations.length}</div>
            <div class="stat-label">Dự án phù hợp</div>
          </div>
          <div class="stat-card">
            <div class="stat-header">
              <div class="stat-icon"><i class="fas fa-file-alt"></i></div>
            </div>
            <div class="stat-value">${applications.length}</div>
            <div class="stat-label">Đã ứng tuyển</div>
          </div>
          <div class="stat-card">
            <div class="stat-header">
              <div class="stat-icon"><i class="fas fa-clock"></i></div>
            </div>
            <div class="stat-value">${applications.filter(a => a.status === 'pending').length}</div>
            <div class="stat-label">Đang chờ duyệt</div>
          </div>
          <div class="stat-card">
            <div class="stat-header">
              <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
            </div>
            <div class="stat-value">${recommendations.length ? Math.round((recommendations[0].match_score ?? recommendations[0].score) || 0) + '%' : '—'}</div>
            <div class="stat-label">Điểm phù hợp cao nhất</div>
          </div>
        `;
        document.getElementById('statsGrid').innerHTML = statsHtml;
        document.getElementById('recCount').textContent = `${recommendations.length} dự án`;
        
        if (!recommendations.length) {
          document.getElementById('projectsGrid').innerHTML = `
            <div class="empty-state">
              <i class="fas fa-inbox"></i>
              <p>Chưa có dự án phù hợp</p>
              <p style="font-size: 0.75rem;">Hãy cập nhật hồ sơ để nhận gợi ý tốt hơn</p>
              <button class="btn-primary" onclick="window.location.href='profile.html'" style="margin-top: 1rem;">
                <i class="fas fa-edit"></i> Cập nhật hồ sơ
              </button>
            </div>
          `;
          return;
        }
        
        const projectsHtml = recommendations.map(project => {
          console.log(project);
          const score = Math.round((project.match_score ?? project.score) || 0);
          const isApplied = appliedIds.has(project.id);
          return `
            <div class="project-card">
              <div class="project-header">
                <div class="project-title">${escapeHtml(project.title)}</div>
                <span class="status-badge ${project.status === 'open' ? 'status-open' : 'status-closed'}">${project.status === 'open' ? 'Đang mở' : 'Đã đóng'}</span>
              </div>
              <div class="project-description">${escapeHtml(project.description?.substring(0, 100) || '')}${project.description?.length > 100 ? '...' : ''}</div>
              <div class="project-tags">
                ${(project.required_skills || []).slice(0, 3).map(skill => `<span class="tag">${escapeHtml(skill)}</span>`).join('')}
                ${project.research_field ? `<span class="tag">${escapeHtml(project.research_field)}</span>` : ''}
                <span class="tag">${project.difficulty_level === 'easy' ? 'Dễ' : project.difficulty_level === 'medium' ? 'Trung bình' : 'Khó'}</span>
              </div>
              <div class="score-bar">
                <div class="score-label">
                  <span>Độ phù hợp</span>
                  <span style="font-weight: 600; color: var(--primary);">${score}%</span>
                </div>
                <div class="bar"><div class="bar-fill" style="width: ${score}%"></div></div>
              </div>
              <div class="project-footer">
                <div class="project-meta">
                  <i class="fas fa-user-tie"></i> ${escapeHtml(project.lecturer_name || 'Giảng viên')}<br>
                  ${project.deadline ? `<i class="fas fa-calendar"></i> HSD: ${project.deadline}` : ''}
                </div>
                ${isApplied ? 
                  '<span class="tag" style="background: #d1fae5; color: #065f46;"><i class="fas fa-check"></i> Đã ứng tuyển</span>' :
                  `<button class="apply-btn" onclick="openApplyModal('${project.id}', '${escapeHtml(project.title).replace(/'/g, "\\'")}')" ${project.status !== 'open' ? 'disabled' : ''}>Ứng tuyển</button>`
                }
              </div>
            </div>
          `;
        }).join('');
        
        document.getElementById('projectsGrid').innerHTML = projectsHtml;
      } catch (err) {
        console.error(err);
        showToast('Lỗi tải dữ liệu', 'error');
      }
    }
    
    // Lecturer Dashboard
    async function loadLecturerDashboard() {
      document.getElementById('studentView').style.display = 'none';
      document.getElementById('lecturerView').style.display = 'block';
      document.getElementById('pageTitle').textContent = 'Dashboard Giảng viên';
      document.getElementById('pageSubtitle').textContent = 'Quản lý dự án và đơn ứng tuyển';
      
      try {
        const res = await fetch(`${API}/api/lecturer/projects`, { headers: { Authorization: `Bearer ${token}` } });
        const data = await res.json();
        const projects = data.projects || [];
        
        const totalApps = projects.reduce((sum, p) => sum + (p.applications_count || 0), 0);
        const pendingApps = projects.reduce((sum, p) => sum + (p.pending_applications || 0), 0);
        const openProjects = projects.filter(p => p.status === 'open').length;
        
        const statsHtml = `
          <div class="stat-card">
            <div class="stat-header"><div class="stat-icon"><i class="fas fa-briefcase"></i></div></div>
            <div class="stat-value">${projects.length}</div>
            <div class="stat-label">Tổng dự án</div>
          </div>
          <div class="stat-card">
            <div class="stat-header"><div class="stat-icon"><i class="fas fa-folder-open"></i></div></div>
            <div class="stat-value">${openProjects}</div>
            <div class="stat-label">Đang mở</div>
          </div>
          <div class="stat-card">
            <div class="stat-header"><div class="stat-icon"><i class="fas fa-file-alt"></i></div></div>
            <div class="stat-value">${totalApps}</div>
            <div class="stat-label">Tổng đơn ứng tuyển</div>
          </div>
          <div class="stat-card">
            <div class="stat-header"><div class="stat-icon"><i class="fas fa-clock"></i></div></div>
            <div class="stat-value">${pendingApps}</div>
            <div class="stat-label">Chờ xử lý</div>
          </div>
        `;
        document.getElementById('statsGrid').innerHTML = statsHtml;
        
        if (!projects.length) {
          document.getElementById('lecturerProjectsGrid').innerHTML = `
            <div class="empty-state">
              <i class="fas fa-folder-open"></i>
              <p>Chưa có dự án nào</p>
              <button class="btn-primary" onclick="openModal('projectModal')" style="margin-top: 1rem;">
                <i class="fas fa-plus"></i> Tạo dự án đầu tiên
              </button>
            </div>
          `;
          return;
        }
        
        const projectsHtml = projects.map(project => `
          <div class="project-card">
            <div class="project-header">
              <div class="project-title">${escapeHtml(project.title)}</div>
              <span class="status-badge ${project.status === 'open' ? 'status-open' : 'status-closed'}">${project.status === 'open' ? 'Đang mở' : 'Đã đóng'}</span>
            </div>
            <div class="project-description">${escapeHtml(project.description?.substring(0, 100) || '')}${project.description?.length > 100 ? '...' : ''}</div>
            <div class="project-tags">
              ${project.research_field ? `<span class="tag">${escapeHtml(project.research_field)}</span>` : ''}
              <span class="tag">${project.difficulty_level === 'easy' ? 'Dễ' : project.difficulty_level === 'medium' ? 'Trung bình' : 'Khó'}</span>
              ${project.duration_weeks ? `<span class="tag"><i class="far fa-clock"></i> ${project.duration_weeks} tuần</span>` : ''}
            </div>
            <div class="project-footer">
              <div class="project-meta">
                <i class="fas fa-users"></i> ${project.applications_count || 0} đơn ứng tuyển
                ${project.pending_applications ? `<br><i class="fas fa-hourglass-half"></i> ${project.pending_applications} chờ duyệt` : ''}
              </div>
              <div style="display: flex; gap: 0.5rem;">
                <button class="btn-outline" onclick="viewApplications('${project.id}', '${escapeHtml(project.title).replace(/'/g, "\\'")}')">
                  <i class="fas fa-eye"></i> Xem đơn
                </button>
                <button class="btn-outline" onclick="toggleProjectStatus('${project.id}', '${project.status}')">
                  <i class="fas ${project.status === 'open' ? 'fa-lock' : 'fa-unlock-alt'}"></i>
                  ${project.status === 'open' ? 'Đóng' : 'Mở lại'}
                </button>
              </div>
            </div>
          </div>
        `).join('');
        
        document.getElementById('lecturerProjectsGrid').innerHTML = projectsHtml;
      } catch (err) {
        console.error(err);
        showToast('Lỗi tải dữ liệu', 'error');
      }
    }
    
    // Apply Modal
    window.openApplyModal = (projectId, title) => {
      selectedProjectId = projectId;
      console.log('[apply] openApplyModal:', { projectId, title });
      document.getElementById('applyModalTitle').textContent = `Ứng tuyển: ${title}`;
      document.getElementById('applicationText').value = '';
      openModal('applyModal');
    };
    
    document.getElementById('confirmApplyBtn').addEventListener('click', async () => {
      if (!selectedProjectId) return;
      const text = document.getElementById('applicationText').value;
      const btn = document.getElementById('confirmApplyBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang gửi...';
      
      try {
        const payload = { project_id: selectedProjectId, application_text: text };
        console.log('[apply] POST /api/applications payload:', payload);
        console.log('[apply] token present:', Boolean(token));
        const res = await fetch(`${API}/api/applications`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        console.log('[apply] response:', { ok: res.ok, status: res.status, data });
        if (res.ok) {
          showToast('Ứng tuyển thành công!', 'success');
          closeModal('applyModal');
          loadStudentDashboard();
        } else {
          showToast(data.message || 'Ứng tuyển thất bại', 'error');
        }
      } catch (err) {
        console.error('[apply] request failed:', err);
        showToast('Lỗi kết nối', 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Gửi ứng tuyển';
      }
    });
    
    // Create Project
    document.getElementById('createProjectBtn').addEventListener('click', () => openModal('projectModal'));
    
    document.getElementById('confirmProjectBtn').addEventListener('click', async () => {
      const title = document.getElementById('projectTitle').value.trim();
      const description = document.getElementById('projectDesc').value.trim();
      if (!title || !description) {
        showToast('Vui lòng nhập tiêu đề và mô tả', 'error');
        return;
      }
      
      const payload = {
        title,
        description,
        research_field: document.getElementById('projectField').value.trim() || null,
        required_skills: document.getElementById('projectSkills').value.split(',').map(s => s.trim()).filter(Boolean),
        difficulty_level: document.getElementById('projectDifficulty').value,
        max_students: parseInt(document.getElementById('projectMaxStudents').value) || 1,
        duration_weeks: parseInt(document.getElementById('projectWeeks').value) || null,
        deadline: document.getElementById('projectDeadline').value || null
      };
      
      const btn = document.getElementById('confirmProjectBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang tạo...';
      
      try {
        const res = await fetch(`${API}/api/lecturer/projects`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (res.ok) {
          showToast('Tạo dự án thành công!', 'success');
          closeModal('projectModal');
          loadLecturerDashboard();
          // Reset form
          document.getElementById('projectTitle').value = '';
          document.getElementById('projectDesc').value = '';
          document.getElementById('projectField').value = '';
          document.getElementById('projectSkills').value = '';
          document.getElementById('projectMaxStudents').value = '1';
          document.getElementById('projectWeeks').value = '';
          document.getElementById('projectDeadline').value = '';
        } else {
          showToast(data.message || 'Tạo dự án thất bại', 'error');
        }
      } catch (err) {
        showToast('Lỗi kết nối', 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Tạo dự án';
      }
    });
    
    // View Applications (Lecturer)
    window.viewApplications = (projectId, title) => {
      window.location.href = `lecturer_applications.html?project=${projectId}`;
    };
    
    // Toggle Project Status
    window.toggleProjectStatus = async (projectId, currentStatus) => {
      const newStatus = currentStatus === 'open' ? 'closed' : 'open';
      try {
        const res = await fetch(`${API}/api/lecturer/projects/${projectId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body: JSON.stringify({ status: newStatus })
        });
        if (res.ok) {
          showToast(`Đã ${newStatus === 'open' ? 'mở lại' : 'đóng'} dự án`, 'success');
          loadLecturerDashboard();
        } else {
          showToast('Không thể thay đổi trạng thái', 'error');
        }
      } catch (err) {
        showToast('Lỗi kết nối', 'error');
      }
    };
    
    // Helper
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }
    
    // Close modal on click outside
    document.querySelectorAll('.modal').forEach(modal => {
      modal.addEventListener('click', (e) => {
        if (e.target === modal) modal.classList.remove('active');
      });
    });
    
    // Initialize
    updateSidebar();
    if (userRole === 'lecturer') {
      loadLecturerDashboard();
    } else {
      loadStudentDashboard();
    }
  </script>
</body>
</html>
