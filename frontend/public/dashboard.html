<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Match AI – Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #2563eb; --blue-dark: #1d4ed8; --blue-light: #eff6ff;
      --gray-50: #f8fafc; --gray-100: #f1f5f9; --gray-200: #e2e8f0;
      --gray-400: #94a3b8; --gray-600: #475569; --gray-800: #1e293b;
      --white: #fff; --radius: 12px; --shadow: 0 2px 12px rgba(15,23,42,.07);
      --sidebar-w: 220px; --nav-h: 56px;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    }
    body { background: var(--gray-50); color: var(--gray-800); }

    /* ── Layout ── */
    .shell { display: flex; min-height: 100vh; }
    .sidebar {
      width: var(--sidebar-w); background: #0f172a; color: #cbd5e1;
      display: flex; flex-direction: column; padding: 20px 12px;
      position: fixed; top: 0; bottom: 0; left: 0; z-index: 100;
    }
    .sidebar-brand {
      display: flex; align-items: center; gap: 8px;
      color: #fff; font-weight: 700; font-size: 15px;
      padding: 4px 8px 20px; text-decoration: none;
    }
    .sidebar-brand svg { flex-shrink: 0; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: 8px; color: #94a3b8;
      text-decoration: none; font-size: 13.5px; font-weight: 500;
      transition: background .15s, color .15s; cursor: pointer; border: none; background: none; width: 100%; text-align: left;
    }
    .nav-item:hover, .nav-item.active { background: #1e293b; color: #fff; }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
    .nav-spacer { flex: 1; }
    .nav-divider { border: none; border-top: 1px solid #1e293b; margin: 8px 0; }

    .main { margin-left: var(--sidebar-w); flex: 1; padding: 28px 28px 48px; max-width: 1100px; }
    .topbar { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; gap: 12px; }
    .topbar h1 { font-size: 22px; font-weight: 700; color: var(--gray-800); }
    .topbar p  { font-size: 13px; color: var(--gray-400); margin-top: 3px; }

    /* ── Buttons ── */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; text-decoration: none; transition: opacity .15s; }
    .btn:hover { opacity: .88; }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-outline { background: var(--white); border: 1.5px solid var(--gray-200); color: var(--gray-800); }
    .btn-danger  { background: #fee2e2; color: #991b1b; }
    .btn-success { background: #dcfce7; color: #166534; }
    .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; }

    /* ── Stats ── */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 24px; }
    .stat-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--shadow); }
    .stat-card .label { font-size: 12px; color: var(--gray-400); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
    .stat-card .value { font-size: 26px; font-weight: 800; color: var(--gray-800); margin-top: 4px; }
    .stat-card .sub   { font-size: 11px; color: var(--gray-400); margin-top: 2px; }

    /* ── Cards / Project items ── */
    .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .section-head h2 { font-size: 16px; font-weight: 700; }
    .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
    .project-card {
      background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius);
      padding: 16px; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 8px;
      transition: transform .2s, box-shadow .2s;
    }
    .project-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(15,23,42,.1); }
    .project-card h3 { font-size: 14.5px; font-weight: 700; color: var(--gray-800); }
    .project-card p  { font-size: 12.5px; color: var(--gray-600); line-height: 1.5; }
    .card-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .tag { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 99px; }
    .tag-blue   { background: var(--blue-light); color: var(--blue-dark); }
    .tag-green  { background: #dcfce7; color: #166534; }
    .tag-yellow { background: #fef9c3; color: #854d0e; }
    .tag-red    { background: #fee2e2; color: #991b1b; }
    .tag-gray   { background: var(--gray-100); color: var(--gray-600); }
    .score-bar-wrap { height: 6px; background: var(--gray-100); border-radius: 99px; overflow: hidden; }
    .score-bar { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--blue), #60a5fa); transition: width .8s ease; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
    .score-label { font-size: 12px; font-weight: 700; color: var(--blue); }

    /* ── Modal ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.hidden { display: none; }
    .modal { background: var(--white); border-radius: 16px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
    .modal-head { padding: 20px 24px 0; display: flex; align-items: center; justify-content: space-between; }
    .modal-head h3 { font-size: 16px; font-weight: 700; }
    .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--gray-400); line-height: 1; }
    .modal-body { padding: 16px 24px 24px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: var(--gray-600); margin-bottom: 5px; }
    .field input, .field textarea, .field select {
      width: 100%; padding: 9px 12px; border: 1.5px solid var(--gray-200); border-radius: 8px;
      font-size: 13.5px; font-family: inherit; color: var(--gray-800); outline: none;
      transition: border-color .15s;
    }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--blue); }
    .field textarea { resize: vertical; min-height: 80px; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* ── Applications table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 9px 12px; background: var(--gray-50); color: var(--gray-600); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--gray-200); }
    td { padding: 10px 12px; border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--gray-50); }

    /* ── Toast ── */
    #toast { position: fixed; bottom: 24px; right: 24px; z-index: 999; padding: 12px 18px; border-radius: 10px; font-size: 13.5px; font-weight: 600; box-shadow: 0 4px 20px rgba(0,0,0,.15); transition: opacity .3s, transform .3s; }
    #toast.hidden { opacity: 0; pointer-events: none; transform: translateY(8px); }
    #toast.success { background: #166534; color: #fff; }
    #toast.error   { background: #991b1b; color: #fff; }

    /* ── Empty / loading states ── */
    .empty { text-align: center; padding: 48px 20px; color: var(--gray-400); }
    .empty svg { margin-bottom: 12px; opacity: .4; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--gray-200); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Lecturer: project detail panel ── */
    .panel-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.3); z-index: 400; display: flex; justify-content: flex-end; }
    .panel-overlay.hidden { display: none; }
    .panel { background: var(--white); width: 100%; max-width: 560px; height: 100%; overflow-y: auto; box-shadow: -4px 0 30px rgba(0,0,0,.12); padding: 28px; }
    .panel-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .panel-head h3 { font-size: 16px; font-weight: 700; }

    /* ── Role badge ── */
    .role-badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 10px; border-radius: 99px; margin-left: 8px; vertical-align: middle; }
    .role-student  { background: #dbeafe; color: #1d4ed8; }
    .role-lecturer { background: #f3e8ff; color: #7c3aed; }
  </style>
</head>
<body>
<div class="shell">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <a class="sidebar-brand" href="index.html">
      <svg width="26" height="26" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="8" fill="#3b6ef4"/><path d="M14 6l2.5 5.5H22l-4.5 3.5 1.5 5.5L14 18l-5 2.5 1.5-5.5L6 11.5h5.5L14 6z" fill="white"/></svg>
      SmartMatch AI
    </a>

    <a class="nav-item active" href="dashboard.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </a>
    <a class="nav-item" href="profile.html" id="navProfile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      Profile
    </a>
    <a class="nav-item" href="my_applications.html" id="navApplications">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      <span id="navApplyLabel">My Applications</span>
    </a>

    <hr class="nav-divider" />
    <div class="nav-spacer"></div>
    <div style="padding: 4px 10px; font-size: 12px; color: #64748b; margin-bottom: 4px;" id="sidebarUser"></div>
    <button class="nav-item" id="logoutBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1"/></svg>
      Sign Out
    </button>
  </aside>

  <!-- ── Main ── -->
  <main class="main">
    <div class="topbar">
      <div>
        <h1 id="pageTitle">Dashboard <span class="role-badge" id="roleBadge"></span></h1>
        <p id="pageSubtitle"></p>
      </div>
      <div style="display:flex;gap:8px;" id="topActions"></div>
    </div>

    <!-- Stats -->
    <div class="stats-row" id="statsRow"></div>

    <!-- Toast / status -->
    <div id="statusMsg" style="margin-bottom:12px;font-size:13px;"></div>

    <!-- Student view -->
    <div id="studentView">
      <div class="section-head">
        <h2>Dự án gợi ý cho bạn</h2>
        <span id="recCount" style="font-size:12px;color:var(--gray-400);"></span>
      </div>
      <div id="projectGrid" class="projects-grid"></div>
    </div>

    <!-- Lecturer view -->
    <div id="lecturerView" style="display:none;">
      <div class="section-head">
        <h2>Dự án của bạn</h2>
        <button class="btn btn-primary" id="btnNewProject">+ Tạo dự án mới</button>
      </div>
      <div id="lecProjectGrid" class="projects-grid"></div>
    </div>
  </main>
</div>

<!-- ── Apply modal ── -->
<div class="modal-overlay hidden" id="applyModal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="applyModalTitle">Apply to Project</h3>
      <button class="modal-close" id="closeApply">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size:13px;color:var(--gray-600);margin-bottom:14px;">Viết thư giới thiệu ngắn gọn về bản thân và lý do bạn phù hợp với dự án này.</p>
      <div class="field">
        <label>Thư giới thiệu (tuỳ chọn)</label>
        <textarea id="applyText" rows="5" placeholder="Mô tả kỹ năng, kinh nghiệm và động lực của bạn..."></textarea>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
        <button class="btn btn-outline" id="cancelApply">Huỷ</button>
        <button class="btn btn-primary" id="confirmApply">Nộp đơn</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Create / Edit project modal ── -->
<div class="modal-overlay hidden" id="projectModal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="projectModalTitle">Tạo dự án mới</h3>
      <button class="modal-close" id="closeProject">✕</button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Tiêu đề *</label><input id="pTitle" type="text" placeholder="Tên dự án nghiên cứu" /></div>
      <div class="field"><label>Mô tả *</label><textarea id="pDesc" placeholder="Mô tả chi tiết dự án, mục tiêu nghiên cứu..."></textarea></div>
      <div class="field-row">
        <div class="field"><label>Lĩnh vực nghiên cứu</label><input id="pField" type="text" placeholder="AI, Machine Learning..." /></div>
        <div class="field"><label>Độ khó</label>
          <select id="pDifficulty">
            <option value="easy">Dễ</option>
            <option value="medium" selected>Trung bình</option>
            <option value="hard">Khó</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field"><label>Số tuần</label><input id="pWeeks" type="number" min="1" placeholder="12" /></div>
        <div class="field"><label>Số sinh viên tối đa</label><input id="pMax" type="number" min="1" placeholder="1" /></div>
      </div>
      <div class="field"><label>Kỹ năng yêu cầu (phân cách bằng dấu phẩy)</label><input id="pSkills" type="text" placeholder="Python, Machine Learning, SQL" /></div>
      <div class="field"><label>Kỹ năng ưu tiên (phân cách bằng dấu phẩy)</label><input id="pPrefSkills" type="text" placeholder="Deep Learning, PyTorch" /></div>
      <div class="field"><label>Hạn nộp (YYYY-MM-DD)</label><input id="pDeadline" type="date" /></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
        <button class="btn btn-outline" id="cancelProject">Huỷ</button>
        <button class="btn btn-primary" id="confirmProject">Tạo dự án</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Applications panel (lecturer) ── -->
<div class="panel-overlay hidden" id="appPanel">
  <div class="panel">
    <div class="panel-head">
      <h3 id="panelTitle">Danh sách ứng tuyển</h3>
      <button class="modal-close" id="closePanel">✕</button>
    </div>
    <div id="panelContent"></div>
  </div>
</div>

<!-- ── Toast ── -->
<div id="toast" class="hidden"></div>

<script src="dashboard.js"></script>
</body>
</html>
